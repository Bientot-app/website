<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bientôt App - Coming Soon</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; color: #333; }
        h1 { font-size: 2.5em; color: #333; }
        p { font-size: 1.2em; margin-top: 10px; }
        .partner-section { margin-top: 50px; }
        .form-container { display: flex; flex-direction: column; align-items: center; }
        input, textarea, button { font-size: 1em; margin-top: 10px; padding: 10px; width: 100%; max-width: 400px; }
        button { background-color: #007BFF; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <h1>Bientôt App - Coming Soon</h1>
    <p>We’re working hard to bring you a unique and secure dating experience!</p>

    <div class="partner-section">
        <h2>Become a Partner</h2>
        <p>Are you a bar or café owner? Partner with us to offer secure, scheduled dates at your venue.</p>

        <div class="form-container">
            <form action="https://your-google-form-link" method="post">
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="text" name="business-name" placeholder="Business Name" required>
                <input type="email" name="email" placeholder="Your Email" required>
                <textarea name="message" placeholder="Tell us about your business" rows="4" required></textarea>
                <button type="submit">Submit</button>
            </form>
        </div>
    </div>
</body>
</html>
